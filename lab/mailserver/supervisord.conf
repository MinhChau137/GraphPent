[program:sshd]
command=/usr/sbin/sshd -D
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/sshd.log
stdout_logfile=/var/log/supervisor/sshd.log

[program:exim4]
# -bdf = daemon foreground (no fork), -q15m = queue runner every 15 min
command=/usr/sbin/exim4 -bdf -q15m
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/exim4.log
stdout_logfile=/var/log/supervisor/exim4.log

[program:dovecot]
# -F = foreground mode
command=/usr/sbin/dovecot -F
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/dovecot.log
stdout_logfile=/var/log/supervisor/dovecot.log
