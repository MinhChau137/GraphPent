[global]
    workgroup = WORKGROUP
    server string = Samba Server Version 3.5.0
    security = user
    map to guest = bad user
    dns proxy = no
    log file = /var/log/samba/log.%m
    max log size = 1000
    logging = file

[share]
    comment = Shared Files
    path = /srv/share
    browsable = yes
    writable = yes
    guest ok = yes
    read only = no
    create mask = 0777
    directory mask = 0777
